name: Publish Hebrew AI Automation Articles

# DISABLED 2026-06-24: site rebranded to SharpenDaily (English). This cron posted
# Hebrew articles and would pollute the English site. Script + manual run kept on
# purpose (infrastructure may be reused). To re-enable, uncomment the schedule.
# English how-tos now come from the `article-forge` skill instead.
on:
  # schedule:
  #   # Weekly AI-agents trend column — every Sunday at 20:00 Israel time (17:00 UTC)
  #   - cron: "0 17 * * 0"
  workflow_dispatch:
    inputs:
      article_type:
        description: "Article type"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Determine article type
        id: type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ARTICLE_TYPE=${{ github.event.inputs.article_type }}" >> $GITHUB_ENV
          elif [ "$(date +%u)" = "7" ]; then
            # Sunday = weekly summary
            echo "ARTICLE_TYPE=weekly" >> $GITHUB_ENV
          else
            echo "ARTICLE_TYPE=daily" >> $GITHUB_ENV
          fi

      - name: Publish article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AUTOMATION_SECRET: ${{ secrets.AUTOMATION_SECRET }}
          ARTICLE_TYPE: ${{ env.ARTICLE_TYPE }}
        run: python publish_article.py
